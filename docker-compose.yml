services:
  db:
    image: postgres:15-alpine
    container_name: user_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: user_service
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
